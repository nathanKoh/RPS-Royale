<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RPS Royale</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <!-- Login screen -->
    <div id="login-screen">
      <h1>RPS Royale</h1>
      <div class="panel">
        <label>
          Username:
          <input id="username" type="text" />
        </label>
        <div class="row">
          <button id="create-room-btn">Create Room</button>
        </div>
        <div class="row">
          <input id="join-code-input" type="text" placeholder="Join code" />
          <button id="join-room-btn">Join Room</button>
        </div>
        <div id="error" class="error"></div>
      </div>
    </div>

    <!-- Lobby screen -->
    <div id="lobby-screen" class="hidden">
      <h2>Lobby</h2>
      <div class="panel">
        <p>Room code: <span id="room-code"></span></p>
        <p>You: <span id="player-name"></span> (<span id="host-label"></span>)</p>
        <p>Round: <span id="round-number">0</span></p>
        <h3>Players</h3>
        <ul id="player-list"></ul>
        <button id="start-game-btn" class="hidden">Start Game</button>
      </div>
    </div>

    <!-- Game screen -->
    <div id="game-screen" class="hidden">
      <div id="top-bar">
        <span>Round: <span id="game-round-number">0</span></span>
        <span>Time left: <span id="countdown"></span></span>
        <span>Current: <span id="current-type">None</span></span>
      </div>

      <div id="game-container">
        <div id="canvas-wrapper">
          <canvas id="game-canvas" width="800" height="600"></canvas>
          <div id="round-overlay" class="hidden"></div>
        </div>

        <div id="side-panel">
          <div id="choice-panel">
            <h3>Choose your type</h3>
            <div class="choices">
              <button class="choice-btn" data-type="ROCK">Rock</button>
              <button class="choice-btn" data-type="PAPER">Paper</button>
              <button class="choice-btn" data-type="SCISSORS">Scissors</button>
            </div>
            <p id="choice-status">Choose type and spawn location</p>
          </div>

          <div id="round-result" class="hidden"></div>
          <div id="game-over" class="hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
